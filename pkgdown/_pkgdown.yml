url: https://zarr-developers.github.io/pizzarr/

template:
  bootstrap: 5
  bslib:
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}
    primary: "#F9A620"
    danger: "#E84855"
    warning: "#F9A620"
    bg: "#1a1a2e"
    fg: "#e0e0e0"
    navbar-bg: "#2B3A67"

authors:
  David Blodgett:
    href: https://github.com/dblodgett-usgs
  Mark Keller:
    href: https://github.com/keller-mark

reference:
- title: "Arrays"
  desc: >
    Core classes for creating and manipulating chunked, compressed,
    N-dimensional Zarr arrays. ZarrArray is the primary interface for
    reading and writing array data; NestedArray handles in-memory representation.
- contents:
  - ZarrArray
  - NestedArray
- title: "Groups"
  desc: >
    Hierarchical containers for organizing multiple arrays and sub-groups,
    analogous to directories in a filesystem.
- contents:
  - ZarrGroup
- title: "Storage"
  desc: >
    Backend storage classes that control where array data is persisted.
    Use DirectoryStore for local files, MemoryStore for ephemeral in-memory
    data, or HttpStore for read-only access to remote Zarr stores.
- contents:
  - Store
  - DirectoryStore
  - MemoryStore
  - HttpStore
- title: "Compressors and filters"
  desc: >
    Codec classes for compressing and decompressing chunk data. Each codec
    wraps a compression algorithm (Zstd, LZ4, Blosc, zlib, etc.) and can be
    passed to array creation functions via the compressor argument.
- contents:
  - Codec
  - ZstdCodec
  - Lz4Codec
  - ZlibCodec
  - GzipCodec
  - Bz2Codec
  - LzmaCodec
  - BloscCodec
  - VLenUtf8Codec
  - get_codec
- title: "Attributes"
  desc: >
    Access to user-defined metadata on arrays and groups, stored as
    JSON-serializable key-value pairs in .zattrs.
- contents:
  - Attributes
- title: "Convenience functions"
  desc: >
    High-level functions for common workflows: creating arrays with specific
    fill values, opening existing stores, and saving R arrays to Zarr format.
- contents:
  - zarr_create
  - zarr_create_empty
  - zarr_create_zeros
  - zarr_create_array
  - zarr_create_group
  - zarr_open
  - zarr_open_group
  - zarr_open_array
  - zarr_save_array
- title: "Utilities"
  desc: >
    Helper functions for slicing, type conversion, and package configuration.
    Use slice() and zb_slice() to select sub-regions of arrays.
- contents:
  - slice
  - zb_slice
  - is_slice
  - int
  - zb_int
  - as_scalar
  - is_scalar
  - is_key_error
  - pizzarr_sample
  - zarr_volcano
  - pizzarr_option_defaults
  - Dtype


